<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>Health AI 控制台</title>
  <link rel="stylesheet" href="styles.css?v=20260342" />
</head>
<body>
  <header class="brand-nav workspace-header">
    <div class="brand-stack">
      <span class="brand-logo">AI</span>
      <h1 class="brand-name">Health AI</h1>
    </div>
    <div class="header-actions">
      <button id="wallet-connect" class="wallet-btn">
        <span class="wallet-icon">👛</span>
        <span id="wallet-text">连接钱包</span>
      </button>
      <a class="ghost-btn" href="index.html">返回首页</a>
    </div>
  </header>

  <div id="workspace-tabs" class="workspace-tabs">
    <button data-tab="agent-audit">Agent Audit</button>
    <button data-tab="multichain-contract-vuln">Multichain Contract Vuln</button>
    <button data-tab="skill-stress-lab">Skill Stress Lab</button>
  </div>

  <section id="app-shell">
    <section id="context-banner">
      <h3 id="current-skill-title">Agent Audit</h3>
      <p id="current-skill-desc">扫描 Skill/Agent 权限、敏感配置与日志，快速定位风险点。</p>
    </section>

    <main class="workspace-grid">
      <section class="panel" id="input-panel">
        <h2>上传代码包</h2>
        <p class="panel-desc">请选择 Skill/Agent 的压缩包，直接上传即可触发体检。</p>

        <div class="upload-zone" id="upload-zone">
          <input type="file" id="code-upload" accept=".zip" hidden />
          <div class="upload-hint" id="upload-hint">
            <span class="upload-icon">📦</span>
            <p class="upload-title">点击或拖拽上传压缩包</p>
            <p class="upload-subtitle">支持 .zip 格式，最大 50MB</p>
          </div>
          <div class="upload-file-info hidden" id="file-info">
            <span class="file-icon">📄</span>
            <div class="file-details">
              <span class="file-name" id="file-name"></span>
              <span class="file-size" id="file-size"></span>
            </div>
            <button class="file-remove" id="file-remove" title="移除文件">✕</button>
          </div>
        </div>

        <div id="param-fields"></div>
        <button id="run-task">开始分析</button>
      </section>

      <section class="panel" id="result-panel">
        <h2>任务结果</h2>
        <div id="task-status" class="status">未开始</div>
        <p id="task-summary" class="task-summary">上传 Skill 包后，可在这里查看状态并下载报告。</p>
        <div id="artifact-links" class="artifact-links hidden"></div>
        <div id="report-preview" class="report-preview hidden"></div>
      </section>
    </main>

    <section class="panel history-panel" id="history-panel">
      <div class="history-head">
        <div>
          <h2>分析历史</h2>
          <div class="history-filters" id="history-filters">
            <button class="filter-btn active" data-filter="all">全部</button>
            <button class="filter-btn" data-filter="agent-audit">Agent Audit</button>
            <button class="filter-btn" data-filter="multichain-contract-vuln">合约审计</button>
            <button class="filter-btn" data-filter="skill-stress-lab">压力测试</button>
          </div>
        </div>
        <span class="history-hint" id="history-count">最近 20 条</span>
      </div>
      <ul id="history-list" class="history-list">
        <li class="empty" id="history-empty">请先连接钱包查看历史记录</li>
      </ul>
    </section>
  </section>

  <script src="main.js?v=20260342" type="module"></script>
</body>
</html>
