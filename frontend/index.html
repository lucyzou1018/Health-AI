<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>Health AI 控制台</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>Health AI</h1>
    <nav id="nav-tabs">
      <button data-tab="agent-audit" class="active">Agent Audit</button>
      <button data-tab="multichain-contract-vuln">Contract Scanner</button>
      <button data-tab="skill-stress-lab">Skill Stress Lab</button>
    </nav>
  </header>

  <section id="hero">
    <div class="hero-card">
      <p class="eyebrow">智能风控 · 扫描 · 压测一站式平台</p>
      <h2>Health AI 帮你即刻完成 Skill 体检、链上合约审计，以及压测验证。</h2>
      <p class="hero-desc">上传或指定代码路径，系统会自动完成权限审计、多链漏洞检测与 stress runner 场景，让你随时掌握 Skill 的健康度。</p>
      <div class="hero-buttons">
        <button class="hero-btn" data-target="agent-audit">Agent Audit</button>
        <button class="hero-btn" data-target="multichain-contract-vuln">Multichain Contract Vuln</button>
        <button class="hero-btn" data-target="skill-stress-lab">Skill Stress Lab</button>
      </div>
    </div>
  </section>

  <main>
    <section class="panel" id="input-panel">
      <h2>代码输入</h2>
      <label class="field">路径
        <input type="text" id="code-path" placeholder="例如：/path/to/skill" />
      </label>
      <label class="field">或上传文件
        <input type="file" id="code-upload" />
      </label>
      <div id="param-fields"></div>
      <button id="run-task">开始分析</button>
    </section>

    <section class="panel" id="result-panel">
      <h2>任务结果</h2>
      <div id="task-status" class="status">未开始</div>
      <pre id="task-output"></pre>
      <div id="artifact-links" class="artifact-links hidden"></div>
    </section>
  </main>

  <script src="main.js" type="module"></script>
</body>
</html>
