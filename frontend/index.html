<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>Health AI</title>
  <link rel="stylesheet" href="styles.css?v=20260312" />
</head>
<body class="landing-only">
  <div class="ambient-glow"></div>
  <div class="grid-overlay"></div>
  
  <header class="brand-nav landing-header">
    <div class="brand-stack">
      <span class="brand-logo">
        <span class="logo-pulse"></span>
        <svg class="lobster-icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="lobsterGradient" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#6366f1"/>
              <stop offset="100%" style="stop-color:#8b5cf6"/>
            </linearGradient>
          </defs>
          <!-- 龙虾身体 -->
          <ellipse cx="16" cy="20" rx="6" ry="8" stroke="url(#lobsterGradient)" stroke-width="1.5" fill="rgba(99,102,241,0.1)"/>
          <!-- 头部 -->
          <circle cx="16" cy="12" r="4" stroke="url(#lobsterGradient)" stroke-width="1.5" fill="none"/>
          <!-- 眼睛 -->
          <circle cx="14.5" cy="11" r="1" fill="#22d3ee"/>
          <circle cx="17.5" cy="11" r="1" fill="#22d3ee"/>
          <!-- 触须 -->
          <path d="M13 8C12 6 10 5 8 6" stroke="url(#lobsterGradient)" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M19 8C20 6 22 5 24 6" stroke="url(#lobsterGradient)" stroke-width="1.5" stroke-linecap="round"/>
          <!-- 左钳子 -->
          <path d="M10 18C7 16 6 14 7 12" stroke="url(#lobsterGradient)" stroke-width="1.5" stroke-linecap="round" fill="none"/>
          <!-- 右钳子（举起扫描） -->
          <path d="M22 18C26 15 27 12 25 10" stroke="url(#lobsterGradient)" stroke-width="1.5" stroke-linecap="round" fill="none"/>
          <circle cx="25" cy="9" r="1.5" fill="#22d3ee" opacity="0.8"/>
          <!-- 数据流/心跳线 -->
          <path d="M13 20L14 18L15 21L16 17L17 20L18 18L19 20" stroke="#22d3ee" stroke-width="0.8" stroke-linecap="round" fill="none" opacity="0.9"/>
          <!-- 尾部 -->
          <path d="M14 28L16 30L18 28" stroke="url(#lobsterGradient)" stroke-width="1.5" stroke-linecap="round" fill="none"/>
        </svg>
      </span>
      <span class="brand-name">Health AI</span>
      <a class="nav-link" href="workspace.html">Work Space</a>
    </div>
  </header>

  <section id="landing">
    <div class="hero-content">
      <div class="hero-badge">
        <span class="badge-dot"></span>
        智能风控 · 审计 · 压测
      </div>
      <h1 class="hero-title">
        <span class="title-gradient">Health AI</span>
      </h1>
      <p class="hero-subtitle">全方位守护您的 Skill 与合约安全</p>
      <p class="hero-desc">上传代码，自动完成权限审计、漏洞检测与压力测试，实时掌握 Skill 健康状态</p>
      <div class="hero-buttons">
        <a class="hero-btn hero-btn--primary" href="workspace.html#agent-audit">
          <span class="btn-text">开始体验</span>
          <span class="btn-arrow">→</span>
        </a>
      </div>
    </div>
    
    <div class="floating-elements">
      <svg width="0" height="0" style="position:absolute">
        <defs>
          <linearGradient id="icon-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#6366f1"/>
            <stop offset="100%" style="stop-color:#8b5cf6"/>
          </linearGradient>
        </defs>
      </svg>
      <div class="float-card card-1">
        <div class="card-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="url(#icon-gradient)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            <path d="M9 12l2 2 4-4"/>
          </svg>
        </div>
        <div class="card-label">安全审计</div>
      </div>
      <div class="float-card card-2">
        <div class="card-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="url(#icon-gradient)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
          </svg>
        </div>
        <div class="card-label">压力测试</div>
      </div>
      <div class="float-card card-3">
        <div class="card-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="url(#icon-gradient)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="16 18 22 12 16 6"/>
            <polyline points="8 6 2 12 8 18"/>
          </svg>
        </div>
        <div class="card-label">合约检测</div>
      </div>
    </div>
  </section>
</body>
</html>
