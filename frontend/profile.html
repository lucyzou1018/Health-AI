  <style>
    /* ── Profile Page Layout ───────────────────────────────────────────── */
    .profile-page {
      min-height: calc(100vh - 64px);
      padding: 48px 24px 80px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .profile-container {
      width: 100%;
      max-width: 680px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ── Card ──────────────────────────────────────────────────────────── */
    .profile-card {
      background: var(--surface, #fff);
      border: 1px solid var(--border, #e2e8f0);
      border-radius: 16px;
      padding: 28px 32px;
    }

    .profile-card-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted, #64748b);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 20px;
    }

    /* ── Avatar + identity ────────────────────────────────────────────── */
    .profile-identity {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .profile-avatar {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
      overflow: hidden;
    }
    .profile-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .profile-identity-info {
      flex: 1;
      min-width: 0;
    }
    .profile-name {
      font-size: 18px;
      font-weight: 700;
      color: var(--text, #1e293b);
      margin-bottom: 4px;
      word-break: break-all;
    }
    .profile-login-type {
      font-size: 12px;
      color: var(--text-muted, #64748b);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .profile-login-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 99px;
      font-size: 11px;
      font-weight: 600;
      background: var(--accent-subtle, #ede9fe);
      color: var(--accent, #6366f1);
    }

    /* ── Info rows ─────────────────────────────────────────────────────── */
    .profile-info-list {
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .profile-info-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px 0;
      border-bottom: 1px solid var(--border, #f1f5f9);
    }
    .profile-info-row:last-child { border-bottom: none; }
    .profile-info-label {
      font-size: 13px;
      color: var(--text-muted, #64748b);
      width: 120px;
      flex-shrink: 0;
    }
    .profile-info-value {
      font-size: 13px;
      font-weight: 500;
      color: var(--text, #1e293b);
      word-break: break-all;
      flex: 1;
    }
    .profile-info-value.mono {
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 12px;
    }

    /* ── Stats ─────────────────────────────────────────────────────────── */
    .profile-stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }
    .profile-stat-card {
      background: var(--surface-2, #f8fafc);
      border: 1px solid var(--border, #e2e8f0);
      border-radius: 12px;
      padding: 16px;
      text-align: center;
    }
    .profile-stat-value {
      font-size: 28px;
      font-weight: 700;
      color: var(--accent, #6366f1);
      line-height: 1;
      margin-bottom: 6px;
    }
    .profile-stat-label {
      font-size: 12px;
      color: var(--text-muted, #64748b);
    }

    /* ── Actions ───────────────────────────────────────────────────────── */
    .profile-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .profile-action-btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 9px 18px;
      border-radius: 9px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 140ms ease;
      border: 1px solid transparent;
      text-decoration: none;
    }
    .profile-action-btn--primary {
      background: var(--accent, #6366f1);
      color: #fff;
      border-color: var(--accent, #6366f1);
    }
    .profile-action-btn--primary:hover {
      opacity: 0.88;
    }
    .profile-action-btn--ghost {
      background: transparent;
      color: var(--text, #1e293b);
      border-color: var(--border, #e2e8f0);
    }
    .profile-action-btn--ghost:hover {
      background: var(--surface-hover, #f1f5f9);
    }
    .profile-action-btn--danger {
      background: transparent;
      color: #ef4444;
      border-color: #fecaca;
    }
    .profile-action-btn--danger:hover {
      background: #fef2f2;
    }

    /* ── Not logged in state ───────────────────────────────────────────── */
    .profile-not-logged-in {
      text-align: center;
      padding: 60px 24px;
    }
    .profile-not-logged-in svg {
      opacity: 0.3;
      margin-bottom: 16px;
    }
    .profile-not-logged-in p {
      color: var(--text-muted, #64748b);
      margin-bottom: 20px;
    }
  </style>
</head>

  <script>
    // ── Read auth state from localStorage ──────────────────────────────────
    var walletAddress = localStorage.getItem("wallet_address") || "";
    var loginType     = localStorage.getItem("login_type") || "";
    var loginEmail    = localStorage.getItem("login_email") || "";
    var githubLogin   = localStorage.getItem("github_login") || "";
    var walletToken   = localStorage.getItem("wallet_token") || "";

    var container = document.getElementById("profile-container");

    function formatAddress(addr) {
      if (!addr || addr.length < 10) return addr;
      return addr.slice(0, 6) + "…" + addr.slice(-4);
    }

    function getDisplayName() {
      if (loginType === "github" && githubLogin) return githubLogin;
      if (loginType === "google" && loginEmail)  return loginEmail.split("@")[0];
      if (walletAddress) return formatAddress(walletAddress);
      return "Anonymous";
    }

    function getInitial() {
      var n = getDisplayName();
      return n ? n[0].toUpperCase() : "?";
    }

    function getLoginBadge() {
      var map = { github: "GitHub", google: "Google", wallet: "Wallet" };
      return map[loginType] || "Web3 Wallet";
    }

    function renderNotLoggedIn() {
      container.innerHTML = [
        '<div class="profile-card">',
        '  <div class="profile-not-logged-in">',
        '    <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>',
        '    <p>You are not signed in. Please sign in to view your profile.</p>',
        '    <a href="login.html" class="profile-action-btn profile-action-btn--primary">Sign In</a>',
        '  </div>',
        '</div>'
      ].join("\n");
    }

    function renderProfile() {
      var displayName = getDisplayName();
      var initial     = getInitial();
      var badge       = getLoginBadge();

      // Stats — load from API if available, otherwise show dashes
      container.innerHTML = [
        '<!-- Identity card -->',
        '<div class="profile-card">',
        '  <div class="profile-card-title">Account</div>',
        '  <div class="profile-identity">',
        '    <div class="profile-avatar" id="profile-avatar">' + initial + '</div>',
        '    <div class="profile-identity-info">',
        '      <div class="profile-name">' + escHtml(displayName) + '</div>',
        '      <div class="profile-login-type">',
        '        Signed in via&nbsp;<span class="profile-login-badge">' + escHtml(badge) + '</span>',
        '      </div>',
        '    </div>',
        '  </div>',
        '</div>',

        '<!-- Details card -->',
        '<div class="profile-card">',
        '  <div class="profile-card-title">Details</div>',
        '  <div class="profile-info-list">',
        loginEmail ? '<div class="profile-info-row"><span class="profile-info-label">Email</span><span class="profile-info-value">' + escHtml(loginEmail) + '</span></div>' : '',
        githubLogin ? '<div class="profile-info-row"><span class="profile-info-label">GitHub</span><span class="profile-info-value">@' + escHtml(githubLogin) + '</span></div>' : '',
        (loginType === "wallet" && walletAddress) ? '<div class="profile-info-row"><span class="profile-info-label">Wallet</span><span class="profile-info-value mono">' + escHtml(walletAddress) + '</span></div>' : '',
        '    <div class="profile-info-row"><span class="profile-info-label">Plan</span><span class="profile-info-value" id="plan-label">Free</span></div>',
        '  </div>',
        '</div>',

        '<!-- Stats card -->',
        '<div class="profile-card">',
        '  <div class="profile-card-title">Usage</div>',
        '  <div class="profile-stats">',
        '    <div class="profile-stat-card"><div class="profile-stat-value" id="stat-total">—</div><div class="profile-stat-label">Total Audits</div></div>',
        '    <div class="profile-stat-card"><div class="profile-stat-value" id="stat-contract">—</div><div class="profile-stat-label">Contract Audits</div></div>',
        '    <div class="profile-stat-card"><div class="profile-stat-value" id="stat-skill">—</div><div class="profile-stat-label">Skill Audits</div></div>',
        '    <div class="profile-stat-card"><div class="profile-stat-value" id="stat-stress">—</div><div class="profile-stat-label">Stress Tests</div></div>',
        '  </div>',
        '</div>',

        '<!-- Actions card -->',
        '<div class="profile-card">',
        '  <div class="profile-card-title">Actions</div>',
        '  <div class="profile-actions">',
        '    <a href="workspace.html" class="profile-action-btn profile-action-btn--ghost">',
        '      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>',
        '      Dashboard',
        '    </a>',
        '    <button class="profile-action-btn profile-action-btn--danger" id="profile-logout-btn">',
        '      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>',
        '      Log Out',
        '    </button>',
        '  </div>',
        '</div>',
      ].join("\n");

      // Bind logout
      var logoutBtn = document.getElementById("profile-logout-btn");
      if (logoutBtn) {
        logoutBtn.addEventListener("click", function() {
          showDisconnectModal();
        });
      }

      // Load stats from API
      loadStats();

      // Plan 显示：所有登录方式都走链上查询
      applyPlanUI();  // 先用缓存立即渲染
      window.addEventListener("planStatusReady", function() { applyPlanUI(); });

      if (loginType === "wallet" && walletAddress && window.fetchPlanFromChain) {
        // wallet 用户：查 walletStatus(address)
        window.fetchPlanFromChain(walletAddress).then(function() { applyPlanUI(); });
      } else if (window.fetchPlanFromChainIdentity) {
        // Google / GitHub 用户：查 identityStatus(keccak256(provider:id))
        var _prov = loginType === "github" ? "github" : "google";
        var _uid  = loginType === "github"
          ? (githubLogin || loginEmail || "")
          : (loginEmail || "");
        if (_uid) {
          window.fetchPlanFromChainIdentity(_prov, _uid).then(function() { applyPlanUI(); });
        } else {
          // 没有 id 信息，清除残留缓存显示 Free
          if (window.clearPlanCache) window.clearPlanCache();
          applyPlanUI();
        }
      }

    }

    // ── Plan UI：从 localStorage 读取，渲染 plan 标签 + 倒计时 ──────────────
    var _countdownTimer = null;

    function applyPlanUI() {
      var cached = window.getCachedPlan ? window.getCachedPlan() : { isPro: false, expiryTs: 0 };
      var planEl = document.getElementById("plan-label");
      var btn    = document.getElementById("upgrade-btn");

      if (btn) {
        btn.style.display = "inline-flex";
        btn.innerHTML = cached.isPro ? "🔥 Extend Pro Plan" : "⚡ Upgrade to Pro";
      }

      if (!planEl) return;

      if (cached.isPro) {
        planEl.innerHTML =
          '<span id="pro-badge" style="' +
          'display:inline-flex;align-items:center;gap:5px;' +
          'padding:3px 12px 3px 8px;border-radius:99px;' +
          'background:linear-gradient(135deg,#6366f1 0%,#a855f7 60%,#ec4899 100%);' +
          'color:#fff;font-size:12px;font-weight:700;letter-spacing:0.04em;' +
          'box-shadow:0 2px 12px rgba(139,92,246,0.45);vertical-align:middle;">' +
          '<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor" style="flex-shrink:0">' +
          '<path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6z"/>' +
          '</svg>PRO</span>' +
          (cached.expiryTs > 0
            ? '<span id="pro-countdown" style="margin-left:8px;font-size:12px;color:#64748b;"></span>'
            : '');

        // 启动倒计时
        if (_countdownTimer) clearInterval(_countdownTimer);
        if (cached.expiryTs > 0) {
          function _tick() {
            var el = document.getElementById("pro-countdown");
            if (!el) { clearInterval(_countdownTimer); return; }
            var now  = Math.floor(Date.now() / 1000);
            var diff = cached.expiryTs - now;
            if (diff <= 0) {
              el.textContent = "Expired";
              clearInterval(_countdownTimer);
              // 过期后刷新 plan 状态
              if (window.clearPlanCache) window.clearPlanCache();
              applyPlanUI();
              return;
            }
            var d  = Math.floor(diff / 86400);
            var h  = Math.floor((diff % 86400) / 3600);
            var m  = Math.floor((diff % 3600) / 60);
            var s  = diff % 60;
            var parts = [];
            if (d > 0) parts.push(d + "d");
            if (h > 0 || d > 0) parts.push(h + "h");
            if (m > 0 || h > 0 || d > 0) parts.push(m + "m");
            parts.push(s + "s");
            el.textContent = "Expires in " + parts.join(" ");
          }
          _tick();
          _countdownTimer = setInterval(_tick, 1000);
        }
      } else {
        if (_countdownTimer) { clearInterval(_countdownTimer); _countdownTimer = null; }
        planEl.textContent = "Free";
      }
    }

    function doLogout() {
      localStorage.removeItem("wallet_token");
      localStorage.removeItem("wallet_address");
      localStorage.removeItem("login_type");
      localStorage.removeItem("login_email");
      localStorage.removeItem("github_login");
      localStorage.removeItem("github_oauth_redirect");
      window.location.href = "login.html";
    }

    function showDisconnectModal() {
      var overlay    = document.getElementById("disconnect-modal");
      var addrEl     = document.getElementById("modal-addr");
      var cancelBtn  = document.getElementById("modal-cancel");
      var confirmBtn = document.getElementById("modal-confirm");
      if (!overlay) { if (confirm("Logout?")) doLogout(); return; }

      // 填充用户标识
      if (addrEl) {
        if (loginEmail) {
          addrEl.textContent = loginEmail;
        } else if (githubLogin) {
          addrEl.textContent = "@" + githubLogin;
        } else if (walletAddress) {
          addrEl.textContent = walletAddress.slice(0, 6) + "..." + walletAddress.slice(-4);
        }
      }

      overlay.classList.add("is-open");
      overlay.setAttribute("aria-hidden", "false");

      function close() {
        overlay.classList.remove("is-open");
        overlay.setAttribute("aria-hidden", "true");
        cancelBtn.removeEventListener("click", onCancel);
        confirmBtn.removeEventListener("click", onConfirm);
        overlay.removeEventListener("click", onBackdrop);
        document.removeEventListener("keydown", onEsc);
      }
      function onCancel()  { close(); }
      function onConfirm() { close(); doLogout(); }
      function onBackdrop(e) { if (e.target === overlay) close(); }
      function onEsc(e)    { if (e.key === "Escape") close(); }

      cancelBtn.addEventListener("click", onCancel);
      confirmBtn.addEventListener("click", onConfirm);
      overlay.addEventListener("click", onBackdrop);
      document.addEventListener("keydown", onEsc);
    }

    function loadStats() {
      if (!walletToken) return;
      var API_BASE = window.HEALTH_AI_API || (
        (window.location.hostname === 'localhost' && ['3000','8091'].includes(window.location.port))
          ? 'http://localhost:8000'
          : window.location.origin
      );

      // 查询审计次数
      fetch(API_BASE + "/api/wallet/history?limit=200", {
        headers: { "X-Wallet-Token": walletToken }
      }).then(function(r) { return r.ok ? r.json() : null; })
        .then(function(data) {
          if (!Array.isArray(data)) return;
          var tasks    = data;
          var total    = tasks.length;
          var contract = tasks.filter(function(t) { return t.skillType === "multichain-contract-vuln"; }).length;
          var skill    = tasks.filter(function(t) { return t.skillType === "skill-security-audit"; }).length;
          var stress   = tasks.filter(function(t) { return t.skillType === "skill-stress-lab"; }).length;
          setText("stat-total",    total);
          setText("stat-contract", contract);
          setText("stat-skill",    skill);
          setText("stat-stress",   stress);
        }).catch(function() {});
    }

    function setText(id, val) {
      var el = document.getElementById(id);
      if (el) el.textContent = val;
    }

    function escHtml(s) {
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    // ── Nav wallet button ──────────────────────────────────────────────────
    (function() {
      var wrap     = document.getElementById("user-menu-wrap");
      var btn      = document.getElementById("wallet-connect");
      var wText    = document.getElementById("wallet-text");
      var dropdown = document.getElementById("user-menu-dropdown");
      var logoutItem = document.getElementById("user-menu-logout");

      if (btn && wText) {
        if (walletAddress || githubLogin || loginEmail) {
          btn.classList.add("connected");
          if (loginType === "github") {
            var ghLogin = githubLogin || loginEmail || "";
            wText.textContent = ghLogin.length > 14 ? ghLogin.slice(0, 12) + ".." : (ghLogin || formatAddress(walletAddress));
          } else if (loginType === "google" && loginEmail) {
            var email = loginEmail;
            if (email.length > 14) {
              var parts = email.split(".");
              var last  = parts[parts.length - 1];
              var front = email.slice(0, 4);
              wText.textContent = front + "..." + last;
            } else {
              wText.textContent = email;
            }
          } else {
            wText.textContent = formatAddress(walletAddress);
          }
        } else {
          btn.classList.remove("connected");
          wText.textContent = "Sign In";
        }
      }

      function closeMenu() { wrap && wrap.classList.remove("is-open"); }
      function toggleMenu() { wrap && wrap.classList.toggle("is-open"); }

      if (btn) {
        btn.addEventListener("click", function() {
          if (walletAddress) { toggleMenu(); } else { window.location.href = "login.html"; }
        });
      }
      document.addEventListener("click", function(e) {
        if (wrap && !wrap.contains(e.target)) closeMenu();
      });
      document.addEventListener("keydown", function(e) { if (e.key === "Escape") closeMenu(); });

      if (logoutItem) {
        logoutItem.addEventListener("click", function() {
          closeMenu();
          showDisconnectModal();
        });
      }
    })();

    // ── Payment status modal (mini progress overlay) ────────────────────────
    function _profileShowStatusModal() {
      var el = document.createElement("div");
      el.style.cssText = "position:fixed;inset:0;z-index:99999;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.55);backdrop-filter:blur(4px);";
      el.innerHTML = [
        '<div style="background:#fff;border-radius:18px;padding:36px 32px;max-width:380px;width:90%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.2);">',
        '<div id="_ps_icon" style="font-size:32px;margin-bottom:12px;">⏳</div>',
        '<div id="_ps_msg" style="font-size:14px;color:#475569;line-height:1.6;min-height:40px;"></div>',
        '<button id="_ps_close" style="display:none;margin-top:20px;padding:10px 24px;border-radius:9px;border:none;background:#6366f1;color:#fff;font-weight:600;cursor:pointer;font-size:14px;">OK</button>',
        '</div>'
      ].join("");
      document.body.appendChild(el);
      var msgEl = el.querySelector("#_ps_msg"), iconEl = el.querySelector("#_ps_icon"), closeEl = el.querySelector("#_ps_close");
      closeEl.onclick = function() { document.body.removeChild(el); };
      return {
        setStatus: function(m) { msgEl.textContent = m; },
        setDone:   function(m) { iconEl.textContent = "✅"; msgEl.innerHTML = "<strong>" + m + "</strong>"; closeEl.style.display = "inline-block"; },
        setError:  function(m) { iconEl.textContent = "❌"; msgEl.textContent = m; closeEl.style.display = "inline-block"; },
        close:     function()  { document.body.removeChild(el); },
      };
    }

    // ── Payment handler for profile page ────────────────────────────────────
    async function _profileHandlePayment(months) {
      var statusModal = _profileShowStatusModal();
      var _wasProBefore = window.getCachedPlan ? window.getCachedPlan().isPro : false;
      try {
        if (!window.executeSubscription || !window.executeSubscriptionForIdentity) {
          statusModal.setError("Subscription module not loaded. Please refresh and try again.");
          return;
        }
        statusModal.setStatus("Loading price…");
        var priceInfo = (window.getCachedMonthlyPrice && window.getCachedMonthlyPrice())
                     || await window.fetchSubscriptionMonthlyPrice();
        if (!priceInfo) { statusModal.setError("Failed to fetch price. Check your network."); return; }
        var totalRaw = priceInfo.raw * BigInt(months);

        if (loginType === "wallet" && walletAddress) {
          await window.executeSubscription(walletAddress, months, totalRaw, function(m) { statusModal.setStatus(m); });
          statusModal.setStatus("Updating your account…");
          if (window.fetchPlanFromChain) await window.fetchPlanFromChain(walletAddress);
        } else if (loginType === "google" || loginType === "github") {
          var _prov = loginType === "github" ? "github" : "google";
          var _id   = loginType === "github" ? (githubLogin || loginEmail || "") : (loginEmail || "");
          if (!_id) { statusModal.setError("Cannot determine your identity. Please re-login."); return; }
          await window.executeSubscriptionForIdentity(_prov, _id, months, totalRaw, function(m) { statusModal.setStatus(m); });
          statusModal.setStatus("Updating your account…");
          if (window.fetchPlanFromChainIdentity) await window.fetchPlanFromChainIdentity(_prov, _id);
        } else {
          statusModal.setError("Please sign in before subscribing."); return;
        }

        var _successMsg = _wasProBefore
          ? "🎉 You have extended your Pro Plan!"
          : "🎉 You are now a Pro member!";
        statusModal.setDone(_successMsg);
        applyPlanUI();
      } catch (err) {
        var code = err && err.code;
        var msg  = err && err.message ? err.message : String(err);
        if (code === 4001 || msg.includes("User rejected") || msg.includes("user rejected") || msg.includes("rejected the request")) {
          statusModal.close();
        } else {
          statusModal.setError(msg);
        }
      }
    }

    // ── Upgrade Modal ──────────────────────────────────────────────────────
    function showUpgradeModal() {
      var overlay  = document.getElementById("upgrade-modal");
      var closeBtn = document.getElementById("upgrade-modal-close");
      var ctaBtn   = document.getElementById("upgrade-modal-cta");
      if (!overlay) return;

      // 根据当前 plan 更新弹窗标题
      var _cached  = window.getCachedPlan ? window.getCachedPlan() : { isPro: false };
      var _titleEl = overlay.querySelector(".upgrade-modal-title");
      var _subEl   = overlay.querySelector(".upgrade-modal-sub");
      var _iconEl  = overlay.querySelector(".upgrade-modal-icon");
      if (_cached.isPro) {
        if (_titleEl) _titleEl.textContent = "Extend Pro Plan";
        if (_subEl)   _subEl.textContent   = "Stack more time on your current Pro subscription";
        if (_iconEl)  _iconEl.textContent  = "🔥";
      } else {
        if (_titleEl) _titleEl.textContent = "Upgrade to Pro";
        if (_subEl)   _subEl.textContent   = "Choose your subscription duration";
        if (_iconEl)  _iconEl.textContent  = "⚡";
      }

      overlay.querySelectorAll("input[name='upgrade-months']").forEach(function(r) { r.checked = false; });
      if (ctaBtn) ctaBtn.disabled = true;

      function onSelect() { if (ctaBtn) ctaBtn.disabled = false; }
      overlay.querySelectorAll("input[name='upgrade-months']").forEach(function(r) {
        r.addEventListener("change", onSelect);
      });

      function close() {
        overlay.classList.remove("is-open");
        overlay.setAttribute("aria-hidden", "true");
        overlay.querySelectorAll("input[name='upgrade-months']").forEach(function(r) {
          r.removeEventListener("change", onSelect);
        });
        if (closeBtn) closeBtn.removeEventListener("click", close);
        if (ctaBtn)   ctaBtn.removeEventListener("click", onCta);
        overlay.removeEventListener("click", onBackdrop);
        document.removeEventListener("keydown", onEsc);
      }
      function onBackdrop(e) { if (e.target === overlay) close(); }
      function onEsc(e)      { if (e.key === "Escape") close(); }
      function onCta() {
        var _needsWallet = (loginType === "google" || loginType === "github") && !window._paymentWalletProvider;
        if (_needsWallet) {
          // 连接钱包后刷新 CTA
          if (typeof connectPaymentWallet === "function") {
            connectPaymentWallet().then(function() {
              if (window._paymentWalletProvider && ctaBtn) {
                ctaBtn.textContent = "Continue with Payment";
                ctaBtn.disabled    = !overlay.querySelector("input[name='upgrade-months']:checked");
              }
            });
          }
          return;
        }
        var sel = overlay.querySelector("input[name='upgrade-months']:checked");
        if (!sel) return;
        close();
        _profileHandlePayment(parseInt(sel.value, 10));
      }

      if (closeBtn) closeBtn.addEventListener("click", close);
      if (ctaBtn)   ctaBtn.addEventListener("click", onCta);
      overlay.addEventListener("click", onBackdrop);
      document.addEventListener("keydown", onEsc);
      overlay.classList.add("is-open");
      overlay.setAttribute("aria-hidden", "false");

      // 动态从合约拉取价格
      if (typeof window.fetchSubscriptionMonthlyPrice === "function") {
        overlay.querySelectorAll(".upgrade-plan-price").forEach(function(el) {
          el.dataset.orig = el.innerHTML;
          el.innerHTML = '<span style="opacity:.45;font-size:12px;">Loading…</span>';
        });
        window.fetchSubscriptionMonthlyPrice().then(function(result) {
          if (!result) {
            overlay.querySelectorAll(".upgrade-plan-price").forEach(function(el) {
              if (el.dataset.orig) el.innerHTML = el.dataset.orig;
            });
            return;
          }
          var p = result.usdt;
          var prices = [p, p * 3, p * 6, p * 12];
          overlay.querySelectorAll(".upgrade-plan-option").forEach(function(opt, i) {
            var priceEl = opt.querySelector(".upgrade-plan-price");
            if (priceEl && prices[i] !== undefined) {
              priceEl.innerHTML = "$" + prices[i].toFixed(2) + ' <span class="upgrade-plan-unit">USDT</span>';
            }
          });
        }).catch(function() {
          overlay.querySelectorAll(".upgrade-plan-price").forEach(function(el) {
            if (el.dataset.orig) el.innerHTML = el.dataset.orig;
          });
        });
      }
    }

    // ── Payment Wallet (Gmail/GitHub users) ─────────────────────────────────
    var paymentWalletAddress  = localStorage.getItem("payment_wallet_address") || null;
    var paymentWalletProvider = null;

    function _updatePaymentWalletUI() {
      var isIdentityUser = loginType === "google" || loginType === "github";
      var wrap  = document.getElementById("payment-wallet-wrap");
      var btn   = document.getElementById("payment-wallet-btn");
      var txtEl = document.getElementById("payment-wallet-text");
      if (wrap)  wrap.style.display  = isIdentityUser ? "inline-flex" : "none";
      if (!btn || !txtEl) return;
      if (paymentWalletAddress) {
        btn.classList.add("connected");
        txtEl.textContent = paymentWalletAddress.slice(0, 6) + "…" + paymentWalletAddress.slice(-4);
      } else {
        btn.classList.remove("connected");
        txtEl.textContent = "Connect Wallet";
      }
    }

    async function connectPaymentWallet() {
      var p = window.ethereum;
      if (!p) { alert("No wallet found. Please install MetaMask or Rabby."); return; }
      try {
        // wallet_requestPermissions 会触发钱包重新弹出账户选择界面
        await p.request({
          method: "wallet_requestPermissions",
          params: [{ eth_accounts: {} }],
        });
        var accounts = await p.request({ method: "eth_accounts" });
        if (!accounts || accounts.length === 0) return;
        paymentWalletAddress  = accounts[0];
        paymentWalletProvider = p;
        window._paymentWalletProvider = p;
        localStorage.setItem("payment_wallet_address", paymentWalletAddress);
        localStorage.setItem("payment_wallet_rdns", "");
        _updatePaymentWalletUI();
      } catch(e) { if (e.code !== 4001) console.error("Payment wallet connect failed:", e); }
    }

    function disconnectPaymentWallet() {
      paymentWalletAddress  = null;
      paymentWalletProvider = null;
      window._paymentWalletProvider = null;
      localStorage.removeItem("payment_wallet_address");
      localStorage.removeItem("payment_wallet_rdns");
      _updatePaymentWalletUI();
    }

    // 绑定 payment wallet 按钮 + 下拉菜单
    (function() {
      function openDrop()  {
        var wrap = document.getElementById("payment-wallet-wrap");
        var drop = document.getElementById("payment-wallet-dropdown");
        if (wrap) wrap.classList.add("is-open");
        if (drop) drop.setAttribute("aria-hidden", "false");
      }
      function closeDrop() {
        var wrap = document.getElementById("payment-wallet-wrap");
        var drop = document.getElementById("payment-wallet-dropdown");
        if (wrap) wrap.classList.remove("is-open");
        if (drop) drop.setAttribute("aria-hidden", "true");
      }
      document.addEventListener("click", function(e) {
        if (e.target.closest("#payment-wallet-btn")) {
          if (paymentWalletAddress) {
            var wrap = document.getElementById("payment-wallet-wrap");
            if (wrap && wrap.classList.contains("is-open")) closeDrop();
            else openDrop();
          } else {
            connectPaymentWallet();
          }
          return;
        }
        if (e.target.closest("#payment-wallet-disconnect")) {
          closeDrop(); disconnectPaymentWallet(); return;
        }
        if (!e.target.closest("#payment-wallet-wrap")) closeDrop();
      });
      document.addEventListener("keydown", function(e) {
        if (e.key === "Escape") closeDrop();
      });
    })();

    // ── Boot ───────────────────────────────────────────────────────────────
    // 任意一种登录标识存在即视为已登录
    var isLoggedIn = !!(walletAddress || githubLogin || loginEmail);
    if (isLoggedIn) {
      renderProfile();
    } else {
      renderNotLoggedIn();
    }
    // 初始化 payment wallet UI
    _updatePaymentWalletUI();
  </script>
</body>
