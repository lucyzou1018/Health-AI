<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>合约审计报告 - Health AI</title>
  <link rel="stylesheet" href="styles.css?v=20260321" />
  <style>
    .report-container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 24px;
    }
    
    .report-header {
      text-align: center;
      padding: 32px 24px;
      background: var(--bg-secondary);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border-subtle);
      margin-bottom: 24px;
    }
    
    .report-header h1 {
      margin: 0 0 8px;
      font-size: 24px;
      font-weight: 600;
    }
    
    .report-meta {
      color: var(--text-secondary);
      font-size: 14px;
    }
    
    /* 风险仪表盘 */
    .risk-dashboard {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }
    
    .risk-card {
      padding: 24px;
      border-radius: var(--radius);
      text-align: center;
      border: 1px solid var(--border-subtle);
      position: relative;
      overflow: hidden;
    }
    
    .risk-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
    }
    
    .risk-card.high {
      background: linear-gradient(135deg, rgba(239, 68, 68, 0.1), rgba(239, 68, 68, 0.05));
    }
    .risk-card.high::before { background: #ef4444; }
    .risk-card.high .risk-number { color: #ef4444; }
    
    .risk-card.medium {
      background: linear-gradient(135deg, rgba(245, 158, 11, 0.1), rgba(245, 158, 11, 0.05));
    }
    .risk-card.medium::before { background: #f59e0b; }
    .risk-card.medium .risk-number { color: #f59e0b; }
    
    .risk-card.low {
      background: linear-gradient(135deg, rgba(34, 197, 94, 0.1), rgba(34, 197, 94, 0.05));
    }
    .risk-card.low::before { background: #22c55e; }
    .risk-card.low .risk-number { color: #22c55e; }
    
    .risk-card.total {
      background: var(--bg-hover);
    }
    .risk-card.total::before { background: var(--accent); }
    .risk-card.total .risk-number { color: var(--accent); }
    
    .risk-number {
      font-size: 42px;
      font-weight: 700;
      line-height: 1;
      margin-bottom: 8px;
    }
    
    .risk-label {
      font-size: 13px;
      color: var(--text-secondary);
      font-weight: 500;
    }
    
    /* 风险分布图表 */
    .risk-chart {
      background: var(--bg-secondary);
      border-radius: var(--radius);
      padding: 20px;
      border: 1px solid var(--border-subtle);
      margin-bottom: 24px;
    }
    
    .chart-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 16px;
      color: var(--text-primary);
    }
    
    .chart-bar {
      display: flex;
      height: 32px;
      border-radius: var(--radius-sm);
      overflow: hidden;
      margin-bottom: 12px;
    }
    
    .chart-segment {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 600;
      color: #fff;
      min-width: 40px;
    }
    
    .chart-segment.high { background: #ef4444; }
    .chart-segment.medium { background: #f59e0b; }
    .chart-segment.low { background: #22c55e; }
    
    .chart-legend {
      display: flex;
      gap: 16px;
      font-size: 12px;
    }
    
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--text-secondary);
    }
    
    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }
    
    /* 问题详情 */
    .issues-section {
      background: var(--bg-secondary);
      border-radius: var(--radius);
      border: 1px solid var(--border-subtle);
      overflow: hidden;
    }
    
    .issues-header {
      padding: 16px 20px;
      background: var(--bg-hover);
      border-bottom: 1px solid var(--border-subtle);
      font-weight: 600;
      font-size: 14px;
    }
    
    .issue-category {
      border-bottom: 1px solid var(--border-subtle);
    }
    
    .issue-category:last-child {
      border-bottom: none;
    }
    
    .category-header {
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: background 150ms ease;
    }
    
    .category-header:hover {
      background: var(--bg-hover);
    }
    
    .category-icon {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
    }
    
    .category-icon.high { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
    .category-icon.medium { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }
    .category-icon.low { background: rgba(34, 197, 94, 0.2); color: #22c55e; }
    
    .category-name {
      flex: 1;
      font-weight: 500;
    }
    
    .category-count {
      padding: 2px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
    }
    
    .category-count.high { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
    .category-count.medium { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }
    .category-count.low { background: rgba(34, 197, 94, 0.2); color: #22c55e; }
    
    .category-arrow {
      color: var(--text-tertiary);
      transition: transform 200ms ease;
    }
    
    .category-arrow.expanded {
      transform: rotate(90deg);
    }
    
    .issue-list {
      display: none;
      padding: 0 20px 16px;
    }
    
    .issue-list.expanded {
      display: block;
    }
    
    .issue-item {
      padding: 12px;
      margin-bottom: 8px;
      background: var(--bg-tertiary);
      border-radius: var(--radius-sm);
      border-left: 3px solid var(--border-subtle);
    }
    
    .issue-item.high { border-left-color: #ef4444; }
    .issue-item.medium { border-left-color: #f59e0b; }
    .issue-item.low { border-left-color: #22c55e; }
    
    .issue-title {
      font-weight: 500;
      margin-bottom: 4px;
      font-size: 13px;
    }
    
    .issue-location {
      font-family: monospace;
      font-size: 11px;
      color: var(--text-tertiary);
      background: var(--bg-hover);
      padding: 2px 6px;
      border-radius: 4px;
      display: inline-block;
      margin-bottom: 6px;
    }
    
    .issue-desc {
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.6;
    }
    
    .issue-link {
      margin-top: 8px;
    }
    
    .issue-link a {
      font-size: 11px;
      color: var(--accent);
      text-decoration: none;
    }
    
    .issue-link a:hover {
      text-decoration: underline;
    }
    
    /* 关键发现 */
    .key-findings {
      background: var(--bg-secondary);
      border-radius: var(--radius);
      padding: 20px;
      border: 1px solid var(--border-subtle);
      margin-bottom: 24px;
    }
    
    .key-findings h3 {
      margin: 0 0 16px;
      font-size: 14px;
      font-weight: 600;
    }
    
    .finding-item {
      display: flex;
      gap: 12px;
      padding: 12px;
      margin-bottom: 8px;
      background: var(--bg-tertiary);
      border-radius: var(--radius-sm);
    }
    
    .finding-icon {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }
    
    .finding-icon.critical { background: rgba(239, 68, 68, 0.2); }
    .finding-icon.warning { background: rgba(245, 158, 11, 0.2); }
    .finding-icon.info { background: rgba(59, 130, 246, 0.2); }
    
    .finding-content h4 {
      margin: 0 0 4px;
      font-size: 13px;
      font-weight: 600;
    }
    
    .finding-content p {
      margin: 0;
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.6;
    }
    
    .loading {
      text-align: center;
      padding: 60px;
      color: var(--text-secondary);
    }
    
    .error {
      text-align: center;
      padding: 40px;
      color: var(--error);
    }
  </style>
</head>
<body>
  <header class="brand-nav workspace-header">
    <div class="brand-stack">
      <span class="brand-logo">AI</span>
      <h1 class="brand-name">Health AI</h1>
    </div>
    <a class="ghost-btn" href="workspace.html#multichain-contract-vuln">返回控制台</a>
  </header>

  <div class="report-container" id="report-container">
    <div class="loading">加载报告中...</div>
  </div>

  <script>
    const API_BASE = window.location.origin;
    
    // 从URL获取任务ID
    function getTaskId() {
      const params = new URLSearchParams(window.location.search);
      return params.get('task');
    }
    
    // 风险等级配置
    const RISK_CONFIG = {
      high: {
        keywords: ['arbitrary-send-eth', 'reentrancy', 'unchecked-transfer', 'delegatecall'],
        label: '高风险',
        color: '#ef4444'
      },
      medium: {
        keywords: ['divide-before-multiply', 'incorrect-equality', 'timestamp', 'low-level-calls'],
        label: '中风险',
        color: '#f59e0b'
      },
      low: {
        keywords: ['assembly', 'naming-convention', 'pragma', 'solc-version', 'unindexed'],
        label: '低风险',
        color: '#22c55e'
      }
    };
    
    // 提取报告数据
    function parseReport(text) {
      const detectors = [];
      const parts = text.split(/\nDetector:/);
      
      for (let i = 1; i < parts.length; i++) {
        const chunk = parts[i].trim();
        if (!chunk) continue;
        
        const lines = chunk.split(/\r?\n/);
        const name = lines[0]?.trim();
        if (!name) continue;
        
        // 提取描述
        let desc = '';
        for (let line of lines.slice(1)) {
          if (line.trim() && !line.startsWith('Reference:')) {
            desc = line.trim().replace(/^[-•]\s*/, '');
            break;
          }
        }
        
        // 提取代码位置
        const locations = [];
        for (let line of lines) {
          const match = line.match(/(\w+\.sol#\d+(?:-\d+)?)/);
          if (match && !locations.includes(match[1])) {
            locations.push(match[1]);
          }
        }
        
        // 确定风险等级
        let level = 'low';
        if (RISK_CONFIG.high.keywords.some(k => name.toLowerCase().includes(k))) level = 'high';
        else if (RISK_CONFIG.medium.keywords.some(k => name.toLowerCase().includes(k))) level = 'medium';
        
        // 提取参考链接
        let reference = '';
        for (let line of lines) {
          if (line.startsWith('Reference:')) {
            reference = line.replace('Reference:', '').trim();
            break;
          }
        }
        
        detectors.push({ name, desc, locations, level, reference });
      }
      
      return detectors;
    }
    
    // 渲染报告
    function renderReport(task, reportText) {
      const detectors = parseReport(reportText);
      const high = detectors.filter(d => d.level === 'high');
      const medium = detectors.filter(d => d.level === 'medium');
      const low = detectors.filter(d => d.level === 'low');
      const total = detectors.length;
      
      const container = document.getElementById('report-container');
      
      let html = '';
      
      // 头部
      html += `
        <div class="report-header">
          <h1>📋 合约安全审计报告</h1>
          <div class="report-meta">
            任务ID: ${task.taskId} · 链别: EVM · 检测时间: ${new Date(task.updatedAt).toLocaleString('zh-CN')}
          </div>
        </div>
      `;
      
      // 风险仪表盘
      html += `
        <div class="risk-dashboard">
          <div class="risk-card high">
            <div class="risk-number">${high.length}</div>
            <div class="risk-label">🔴 高风险</div>
          </div>
          <div class="risk-card medium">
            <div class="risk-number">${medium.length}</div>
            <div class="risk-label">🟡 中风险</div>
          </div>
          <div class="risk-card low">
            <div class="risk-number">${low.length}</div>
            <div class="risk-label">🟢 低风险</div>
          </div>
          <div class="risk-card total">
            <div class="risk-number">${total}</div>
            <div class="risk-label">📊 总计</div>
          </div>
        </div>
      `;
      
      // 风险分布图表
      const highPct = total ? (high.length / total * 100).toFixed(1) : 0;
      const mediumPct = total ? (medium.length / total * 100).toFixed(1) : 0;
      const lowPct = total ? (low.length / total * 100).toFixed(1) : 0;
      
      html += `
        <div class="risk-chart">
          <div class="chart-title">风险分布</div>
          <div class="chart-bar">
            ${high.length ? `<div class="chart-segment high" style="width: ${highPct}%">${high.length}</div>` : ''}
            ${medium.length ? `<div class="chart-segment medium" style="width: ${mediumPct}%">${medium.length}</div>` : ''}
            ${low.length ? `<div class="chart-segment low" style="width: ${lowPct}%">${low.length}</div>` : ''}
          </div>
          <div class="chart-legend">
            <div class="legend-item"><div class="legend-dot" style="background: #ef4444;"></div>高风险 ${highPct}%</div>
            <div class="legend-item"><div class="legend-dot" style="background: #f59e0b;"></div>中风险 ${mediumPct}%</div>
            <div class="legend-item"><div class="legend-dot" style="background: #22c55e;"></div>低风险 ${lowPct}%</div>
          </div>
        </div>
      `;
      
      // 关键发现
      if (high.length > 0) {
        html += `
          <div class="key-findings">
            <h3>⚠️ 关键风险发现</h3>
        `;
        
        const criticalFindings = [
          {
            icon: '💰',
            title: 'ETH 转账风险',
            desc: '检测到 ${high.filter(d => d.name.includes('send-eth')).length} 处 ETH 发送至任意地址的调用，需要确保有适当的权限控制和重入保护机制。',
          },
          {
            icon: '⏰',
            title: '时间依赖风险',
            desc: '合约大量使用 block.timestamp 进行关键逻辑判断，可能被矿工操纵，建议考虑使用 block.number 或引入时间窗口容忍度。',
          },
          {
            icon: '📐',
            title: '精度计算风险',
            desc: '检测到先除后乘的计算模式，可能导致精度损失，建议调整计算顺序或使用数学库确保精度。',
          }
        ];
        
        for (const finding of criticalFindings) {
          html += `
            <div class="finding-item">
              <div class="finding-icon critical">${finding.icon}</div>
              <div class="finding-content">
                <h4>${finding.title}</h4>
                <p>${finding.desc}</p>
              </div>
            </div>
          `;
        }
        
        html += '</div>';
      }
      
      // 问题详情
      html += `
        <div class="issues-section">
          <div class="issues-header">📑 详细问题列表</div>
      `;
      
      // 高风险
      if (high.length > 0) {
        html += renderCategory('high', '🔴', high);
      }
      
      // 中风险
      if (medium.length > 0) {
        html += renderCategory('medium', '🟡', medium);
      }
      
      // 低风险
      if (low.length > 0) {
        html += renderCategory('low', '🟢', low);
      }
      
      html += '</div>';
      
      container.innerHTML = html;
      
      // 绑定展开/折叠事件
      document.querySelectorAll('.category-header').forEach(header => {
        header.addEventListener('click', () => {
          const category = header.dataset.category;
          const list = document.getElementById(`list-${category}`);
          const arrow = header.querySelector('.category-arrow');
          list.classList.toggle('expanded');
          arrow.classList.toggle('expanded');
        });
      });
    }
    
    function renderCategory(level, icon, items) {
      const config = RISK_CONFIG[level];
      
      let html = `
        <div class="issue-category">
          <div class="category-header" data-category="${level}">
            <div class="category-icon ${level}">${icon}</div>
            <div class="category-name">${config.label}</div>
            <div class="category-count ${level}">${items.length} 个</div>
            <div class="category-arrow">▶</div>
          </div>
          <div class="issue-list" id="list-${level}">
      `;
      
      for (const item of items) {
        html += `
          <div class="issue-item ${level}">
            <div class="issue-title">${item.name}</div>
            ${item.locations.length ? `<div class="issue-location">📍 ${item.locations.slice(0, 3).join(', ')}${item.locations.length > 3 ? ` ...等${item.locations.length}处` : ''}</div>` : ''}
            <div class="issue-desc">${item.desc || '详见报告'}</div>
            ${item.reference ? `<div class="issue-link"><a href="${item.reference}" target="_blank">📖 查看文档 →</a></div>` : ''}
          </div>
        `;
      }
      
      html += '</div></div>';
      return html;
    }
    
    // 加载报告
    async function loadReport() {
      const taskId = getTaskId();
      if (!taskId) {
        document.getElementById('report-container').innerHTML = `
          <div class="error">❌ 缺少任务ID，请在URL中添加 ?task=任务ID</div>
        `;
        return;
      }
      
      try {
        // 获取任务信息
        const taskResp = await fetch(`${API_BASE}/api/tasks/${taskId}`);
        if (!taskResp.ok) throw new Error('获取任务信息失败');
        const task = await taskResp.json();
        
        if (task.status !== 'completed') {
          document.getElementById('report-container').innerHTML = `
            <div class="error">⏳ 任务尚未完成，当前状态: ${task.status}</div>
          `;
          return;
        }
        
        // 获取报告内容
        const reportResp = await fetch(`${API_BASE}/api/tasks/${taskId}/report`);
        if (!reportResp.ok) throw new Error('获取报告失败');
        const reportText = await reportResp.text();
        
        renderReport(task, reportText);
      } catch (err) {
        document.getElementById('report-container').innerHTML = `
          <div class="error">❌ ${err.message}</div>
        `;
      }
    }
    
    loadReport();
  </script>
</body>
</html>
